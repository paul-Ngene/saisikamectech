<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Example - Blue Theme</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
  <style>
    /* Custom Blue Theme Overrides */
    
    /* 1. Navbar Styles */
    .navbar-inverse {
      background-color: #1e3a8a; /* Deep navy blue */
      border-color: #1d4ed8;
    }
    .navbar-inverse .navbar-brand {
      color: #ffffff;
    }
    .navbar-inverse .navbar-brand:hover {
      color: #93c5fd;
    }
    .navbar-inverse .navbar-nav > li > a {
      color: #e2e8f0;
    }
    .navbar-inverse .navbar-nav > li > a:hover {
      color: #ffffff;
      background-color: #1d4ed8;
    }
    .navbar-inverse .navbar-nav > .active > a, 
    .navbar-inverse .navbar-nav > .active > a:hover, 
    .navbar-inverse .navbar-nav > .active > a:focus {
      color: #ffffff;
      background-color: #3b82f6; /* Bright blue highlight */
    }

    /* 2. Layout & Typography */
    .navbar {
      margin-bottom: 0;
      border-radius: 0;
    }
    
    .row.content { height: 450px; }
    
    /* Side navigation panel */
    .sidenav {
      padding-top: 20px;
      background-color: #f0f7ff; /* Very soft ice blue */
      height: 100%;
    }
    
    /* Custom style for links inside the sidebar */
    .sidenav a {
      color: #2563eb;
    }
    .sidenav a:hover {
      color: #1d4ed8;
      text-decoration: underline;
    }

    /* Wells (the ad boxes) */
    .well {
      background-color: #e0f2fe; /* Light blue tint */
      border: 1px solid #bae6fd;
    }
    
    /* 3. Footer Styles */
    footer {
      background-color: #0f172a; /* Deep dark blue */
      color: #94a3b8;
      padding: 15px;
    }
    
    /* Responsive adjustment */
    @media screen and (max-width: 767px) {
      .sidenav {
        height: auto;
        padding: 15px;
      }
      .row.content { height: auto; } 
    }
/* Simple styling to make it look clean */
        .login-container { width: 300px; margin: 50px auto; font-family: sans-serif; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        .error-message { color: red; margin-top: 10px; display: none; }
  </style>
</head>

<body>

<nav class="navbar navbar-inverse">
  <div class="container-fluid">
    <div class="navbar-header">
      <button type="button" class="navbar-toggle" data-toggle="collapse" data-target="#myNavbar">
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>                        
      </button>
      <a class="navbar-brand" href="#">Logo</a>
    </div>
    <div class="collapse navbar-collapse" id="myNavbar">
      <ul class="nav navbar-nav">
        <li class="active"><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Projects</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
      <ul class="nav navbar-nav navbar-right">
        <li><a href="#"><span class="glyphicon glyphicon-log-in"></span> Login</a></li>
      </ul>
    </div>
  </div>
</nav>
  
<div class="container-fluid text-center">    
  <div class="row content">
     {% block content %}
        {% endblock %}
  </div>
</div>

<footer class="container-fluid text-center">
  <p>Footer Text</p>
</footer>

</body>

</html>
