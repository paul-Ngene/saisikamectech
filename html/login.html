<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        /* Simple styling to make it look clean */
        .login-container { width: 300px; margin: 50px auto; font-family: sans-serif; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        .error-message { color: red; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Login</h2>
    
    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="text" id="email" required> 
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required>
        </div>
        
        <button type="submit">Log In</button>
    </form>

    <div id="errorBox" class="error-message"></div>
</div>

<script>
    // Connecting the HTML Form to the JavaScript Fetch request
    document.getElementById('loginForm').addEventListener('submit', async function(event) {
        event.preventDefault(); // Prevents the page from reloading on submit

        const emailInput = document.getElementById('email').value;
        const passwordInput = document.getElementById('password').value;
        const errorBox = document.getElementById('errorBox');
        
        errorBox.style.display = 'none'; // Hide any previous errors

        try {
            const response = await fetch('/login/', { // Your Django URL route
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    email: emailInput, 
                    password: passwordInput 
                })
            });

            const data = await response.json();

            if (response.ok) {
                alert("Success! " + data.message);
                window.location.href = '/dashboard'; // Redirect on success
            } else {
                // Displays the "Invalid credentials" error sent by Django
                errorBox.textContent = data.error;
                errorBox.style.display = 'block';
            }
        } catch (error) {
            errorBox.textContent = "Something went wrong connection-wise.";
            errorBox.style.display = 'block';
        }
    });
</script>

</body>
</html>
